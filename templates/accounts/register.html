{% extends 'base.html' %} {% block content %}
<div
  class="d-flex align-items-center justify-content-center"
  style="min-vh: 85vh"
>
  <div
    class="card register-card p-4 shadow-lg text-white"
    style="width: 100%; max-width: 440px; border-radius: 16px"
  >
    <div class="text-center mb-4">
      <div class="icon-box mb-2">
        <i
          class="fa-solid fa-user-plus text-primary"
          style="font-size: 28px"
        ></i>
      </div>
      <h2 class="fw-bold mb-1">Create Account</h2>
      <p class="text-secondary small">
        Get started with your free screening account
      </p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group mb-3">
        <label class="form-label small text-secondary fw-semibold"
          >Username</label
        >
        <div class="input-group">
          <span
            class="input-group-text bg-dark-input border-secondary-subtle text-secondary"
            ><i class="fa-solid fa-user"></i
          ></span>
          <input
            type="text"
            name="username"
            class="form-control bg-dark-input text-white border-secondary-subtle shadow-none"
            placeholder="Choose a username"
            required
          />
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="form-label small text-secondary fw-semibold"
          >Email Address</label
        >
        <div class="input-group">
          <span
            class="input-group-text bg-dark-input border-secondary-subtle text-secondary"
            ><i class="fa-solid fa-envelope"></i
          ></span>
          <input
            type="email"
            name="email"
            class="form-control bg-dark-input text-white border-secondary-subtle shadow-none"
            placeholder="name@example.com"
            required
          />
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="form-label small text-secondary fw-semibold"
          >Password</label
        >
        <div class="input-group">
          <span
            class="input-group-text bg-dark-input border-secondary-subtle text-secondary"
            ><i class="fa-solid fa-lock"></i
          ></span>
          <input
            type="password"
            name="password"
            class="form-control bg-dark-input text-white border-secondary-subtle shadow-none"
            placeholder="••••••••"
            required
          />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small text-secondary fw-semibold">
          Register As
        </label>

        <select
          name="role"
          class="form-select bg-dark-input text-white border-secondary-subtle"
        >
          <option value="candidate">Candidate</option>

          <option value="recruiter">Recruiter</option>
        </select>
      </div>

      <button
        class="btn btn-primary w-100 fw-bold py-2.5 register-btn"
        type="submit"
      >
        Register &nbsp;<i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-secondary mb-0">
        Already have an account?
        <a
          href="/accounts/login/"
          class="text-primary text-decoration-none fw-semibold"
          >Sign in</a
        >
      </p>
    </div>
  </div>
</div>

<style>
  body {
    background-color: #0b0f19 !important; /* डीप डार्क नाइट ब्लू */
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .register-card {
    background-color: #111827 !important; /* गहरा चारकोल/ग्रे कलर */
    border: 1px solid rgba(255, 255, 255, 0.08);
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .bg-dark-input {
    background-color: #1f2937 !important;
    border-color: #374151 !important;
  }
  .bg-dark-input:focus {
    background-color: #1f2937 !important;
    border-color: #0d6efd !important;
    color: #fff !important;
  }

  .icon-box {
    background: rgba(13, 110, 253, 0.1);
    width: 60px;
    height: 60px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid rgba(13, 110, 253, 0.2);
  }

  .register-btn {
    background: linear-gradient(45deg, #0d6efd, #0056b3);
    border: none;
    transition: all 0.3s ease;
  }
  .register-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
  }
</style>
{% endblock %}
