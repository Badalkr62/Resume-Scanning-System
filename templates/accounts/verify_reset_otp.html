<!doctype html>
<html>
  <head>
    <title>Verify Reset OTP</title>
  </head>
  <body>
    <h2>Verify Password Reset OTP</h2>

    {% if messages %} {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %} {% endif %}

    <form method="POST">
      {% csrf_token %}

      <input
        type="text"
        name="otp"
        placeholder="Enter OTP"
        maxlength="6"
        required
      />

      <button type="submit">Verify OTP</button>
    </form>
  </body>
</html>
