{% extends "base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/choose_role.css' %}">

<div class="role-container">

    <div class="role-card">

        <h2>Welcome {{ user.username }}</h2>

        <h4>Select Login Mode</h4>

        <a href="{% url 'home' %}" class="role-btn user-btn">
            Continue as User
        </a>

        {% if user.userprofile.role == "recruiter" %}
        <a href="{% url 'dashboard' %}" class="role-btn recruiter-btn">
            Continue as Recruiter
        </a>
        {% endif %}

    </div>

</div>

{% endblock %}
