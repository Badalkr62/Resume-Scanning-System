{% extends 'base.html' %} {% block content %}
<div
  class="d-flex align-items-center justify-content-center"
  style="min-vh: 85vh"
>
  <div
    class="card login-card p-4 shadow-lg text-white"
    style="width: 100%; max-width: 420px; border-radius: 16px"
  >
    <div class="text-center mb-4">
      <div class="icon-box mb-2">
        <i class="fa-solid fa-lock text-primary" style="font-size: 28px"></i>
      </div>
      <h2 class="fw-bold mb-1">Welcome Back</h2>
      <p class="text-secondary small">Please enter your details to sign in</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group mb-3">
        <label class="form-label small text-secondary fw-semibold"
          >Username</label
        >
        <div class="input-group">
          <span
            class="input-group-text bg-dark-input border-secondary-subtle text-secondary"
            ><i class="fa-solid fa-user"></i
          ></span>
          <input
            type="text"
            name="username"
            class="form-control bg-dark-input text-white border-secondary-subtle shadow-none"
            placeholder="Enter username"
            required
          />
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="form-label small text-secondary fw-semibold"
          >Password</label
        >
        <div class="input-group">
          <span
            class="input-group-text bg-dark-input border-secondary-subtle text-secondary"
            ><i class="fa-solid fa-key"></i
          ></span>
          <input
            type="password"
            name="password"
            class="form-control bg-dark-input text-white border-secondary-subtle shadow-none"
            placeholder="••••••••"
            required
          />
        </div>
      </div>

      <button
        class="btn btn-primary w-100 fw-bold py-2.5 login-btn"
        type="submit"
      >
        Sign In &nbsp;<i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-secondary mb-0">
        Don't have an account?
        <a
          href="/accounts/register/"
          class="text-primary text-decoration-none fw-semibold"
          >Sign up</a
        >
      </p>
    </div>
  </div>
</div>

<style>
  /* पूरे बैकग्राउंड को डार्क थीम देने के लिए (अगर आपके base.html में पहले से डार्क नहीं है) */
  body {
    background-color: #0b0f19 !important; /* डीप डार्क नाइट ब्लू */
  }

  /* 1. ओपन होने वाला जादुई एनिमेशन (Fade In & Slide Up) */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* लॉगइन कार्ड की डार्क ग्लास स्टाइल */
  .login-card {
    background-color: #111827 !important; /* गहरा चारकोल/ग्रे कलर */
    border: 1px solid rgba(255, 255, 255, 0.08);
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; /* एनिमेशन लागू किया */
  }

  /* इनपुट बॉक्स डार्क स्टाइल */
  .bg-dark-input {
    background-color: #1f2937 !important;
    border-color: #374151 !important;
  }
  .bg-dark-input:focus {
    background-color: #1f2937 !important;
    border-color: #0d6efd !important;
    color: #fff !important;
  }

  /* आइकॉन बॉक्स ग्लो इफेक्ट */
  .icon-box {
    background: rgba(13, 110, 253, 0.1);
    width: 60px;
    height: 60px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid rgba(13, 110, 253, 0.2);
  }

  /* बटन होवर स्मूथ ट्रांजिशन */
  .login-btn {
    background: linear-gradient(45deg, #0d6efd, #0056b3);
    border: none;
    transition: all 0.3s ease;
  }
  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
  }
</style>
{% endblock %}
