{% load static %}

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Smart Resume Screening</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <link rel="stylesheet" href="{% static 'css/job.css' %}" />
    <link rel="stylesheet" href="{% static 'css/job_list.css' %}" />
    <link rel="stylesheet" href="{% static 'css/about.css' %}" />
    <link rel="stylesheet" href="{% static 'css/works.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>

  <body>
    {% include 'navbar.html' %}

    <!-- ✅ Messages Popup -->
    {% if messages %}
    <div id="message-container">
      {% for message in messages %}
      <div class="popup-box alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %} {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ⏱ Auto close messages after 3 seconds -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          const popups = document.querySelectorAll(".popup-box");

          popups.forEach(function (popup) {
            popup.style.transition = "opacity 0.5s ease";
            popup.style.opacity = "0";

            setTimeout(function () {
              popup.remove();
            }, 500);
          });
        }, 2000); // 2 seconds
      });
    </script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const toggle = document.getElementById("toggleBtn");

      toggle.onclick = function () {
        sidebar.classList.toggle("close");
      };
    </script>
  </body>
</html>
