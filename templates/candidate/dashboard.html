{% extends "base.html" %} {% block content %}

<div class="container py-5">
  <h2 class="mb-4">Welcome {{ request.user.username }}</h2>

  <div class="row">
    <div class="col-md-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h2>{{ total_applications }}</h2>

          <p>Total Applications</p>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h2>{{ pending }}</h2>

          <p>Pending</p>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h2>{{ shortlisted }}</h2>

          <p>Shortlisted</p>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h2>{{ interview }}</h2>

          <p>Interview</p>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
