{% extends "base.html" %}
{% block content %}

<!-- Bootstrap Icons CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <div class="card shadow-lg border-secondary-subtle rounded-4 overflow-hidden bg-dark text-light">
        
        <!-- Header Section -->
        <div class="card-header bg-primary text-white p-4 border-0">
          <h4 class="mb-1 fw-bold fs-5">
            <i class="bi bi-send-fill me-2"></i>Apply For {{ job.title|default:"Data Analyst" }}
          </h4>
          <p class="mb-0 text-white-50 small">
            <i class="bi bi-building me-1"></i>{{ job.company|default:"Company Name" }}
          </p>
        </div>

        <!-- Body Form Section -->
        <div class="card-body p-4 p-md-5">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Resume Upload Field -->
            <div class="mb-4">
              <label for="resume" class="form-label fw-semibold text-white">
                Upload Resume / CV <span class="text-danger">*</span>
              </label>
              <div class="input-group">
                <span class="input-group-text bg-secondary bg-opacity-25 text-secondary-subtle border-secondary border-end-0">
                  <i class="bi bi-file-earmark-arrow-up fs-5"></i>
                </span>
                <input 
                  type="file" 
                  name="resume" 
                  id="resume" 
                  class="form-control bg-secondary bg-opacity-25 border-secondary text-white border-start-0 py-2.5 dark-file-input" 
                  accept=".pdf,.doc,.docx"
                  required 
                />
              </div>
              <div class="form-text small text-secondary-subtle mt-1">
                Accepted formats: PDF, DOC, DOCX (Max size: 5MB)
              </div>
            </div>

            <!-- Action Button -->
            <button type="submit" class="btn btn-success w-100 py-2.5 fw-bold rounded-3 shadow-sm hover-btn">
              <i class="bi bi-check-circle-fill me-2"></i>Apply Now
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Custom Dark Styles & Hover Animation Effect -->
<style>
  .hover-btn {
    transition: all 0.2s ease-in-out;
  }
  .hover-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 .5rem 1rem rgba(25, 135, 84, 0.4) !important;
  }
  /* Dark mode styling for custom file upload input */
  .dark-file-input::file-selector-button {
    background-color: var(--bs-secondary-bg);
    color: #fff;
    border: 1px solid var(--bs-border-color);
    border-radius: 0.375rem;
    margin-right: 12px;
    padding: 4px 12px;
    transition: background-color 0.2s ease;
  }
  .dark-file-input::file-selector-button:hover {
    background-color: var(--bs-secondary-border-subtle);
    color: #fff;
    cursor: pointer;
  }
</style>

{% endblock %}
