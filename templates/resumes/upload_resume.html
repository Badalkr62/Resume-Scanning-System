{% extends 'base.html' %} 

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-vh: 85vh;">
  
  <div class="card upload-card p-4 shadow-lg text-white" style="width: 100%; max-width: 480px; border-radius: 16px;">
    
    <div class="text-center mb-4">
      <div class="icon-box mb-2">
        <i class="fa-solid fa-cloud-arrow-up text-success" style="font-size: 28px;"></i>
      </div>
      <h2 class="fw-bold mb-1">Upload Resume</h2>
      <p class="text-secondary small">Enter candidate details and parse the resume file</p>
    </div>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-group mb-3">
        <label class="form-label small text-secondary fw-semibold">Candidate Name</label>
        <div class="input-group">
          <span class="input-group-text bg-dark-input border-secondary-subtle text-secondary"><i class="fa-solid fa-user"></i></span>
          <input type="text" name="name" class="form-control bg-dark-input text-white border-secondary-subtle shadow-none" placeholder="John Doe" required>
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="form-label small text-secondary fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-dark-input border-secondary-subtle text-secondary"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" name="email" class="form-control bg-dark-input text-white border-secondary-subtle shadow-none" placeholder="john@example.com" required>
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="form-label small text-secondary fw-semibold">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text bg-dark-input border-secondary-subtle text-secondary"><i class="fa-solid fa-phone"></i></span>
          <input type="text" name="phone" class="form-control bg-dark-input text-white border-secondary-subtle shadow-none" placeholder="+1 (555) 000-0000" required>
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="form-label small text-secondary fw-semibold">Resume File (PDF, DOCX)</label>
        <input type="file" name="resume" class="form-control bg-dark-input text-white border-secondary-subtle file-custom shadow-none" required />
      </div>

      <button type="submit" class="btn btn-success w-100 fw-bold py-2.5 upload-btn">
        <i class="fa-solid fa-file-import me-1"></i> Process & Upload
      </button>
    </form>

  </div>
</div>

<style>
  body {
    background-color: #0b0f19 !important; /* डीप डार्क नाइट ब्लू */
  }

  /* 1. ओपन होने वाला जादुई एनिमेशन (Fade In & Slide Up) */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* अपलोड कार्ड डार्क डिज़ाइन */
  .upload-card {
    background-color: #111827 !important; /* गहरा चारकोल/ग्रे कलर */
    border: 1px solid rgba(255, 255, 255, 0.08);
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* इनपुट बॉक्स डार्क स्टाइल */
  .bg-dark-input {
    background-color: #1f2937 !important;
    border-color: #374151 !important;
  }
  .bg-dark-input:focus {
    background-color: #1f2937 !important;
    border-color: #198754 !important; /* फोकस होने पर ग्रीन बॉर्डर */
    color: #fff !important;
  }

  /* फाइल अपलोड बटन की विशेष स्टाइल */
  .file-custom::-webkit-file-upload-button {
    background-color: #374151;
    color: white;
    border: none;
    padding: 4px 12px;
    border-radius: 6px;
    margin-right: 10px;
    transition: background 0.2s ease;
  }
  .file-custom:focus {
    border-color: #198754 !important;
  }
  .file-custom::-webkit-file-upload-button:hover {
    background-color: #4b5563;
  }

  /* टॉप आइकॉन बॉक्स ग्लो इफेक्ट */
  .icon-box {
    background: rgba(25, 135, 84, 0.1);
    width: 60px;
    height: 60px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid rgba(25, 135, 84, 0.2);
  }

  /* बटन स्टाइल और होवर इफेक्ट */
  .upload-btn {
    background: linear-gradient(45deg, #198754, #146c43);
    border: none;
    transition: all 0.3s ease;
  }
  .upload-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(25, 135, 84, 0.4);
  }
</style>
{% endblock %}
