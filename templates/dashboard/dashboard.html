{% load static %}
<!doctype html>
<html>
  <head>
    <title>Smart Resume Screening</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f6f9;
      }

      /* Navbar */

      .navbar {
        height: 65px;
      }

      /* Sidebar */

      .sidebar {
        width: 240px;
        height: calc(100vh - 65px);
        background: #001529;
        position: fixed;
        top: 65px;
        left: 0;
      }

      .sidebar a {
        display: block;

        padding: 15px;

        color: white;

        text-decoration: none;
      }

      .sidebar a:hover {
        background: #1677ff;
      }

      /* Content */

      .main-content {
        margin-left: 240px;

        margin-top: 65px;

        padding: 25px;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <!-- Left Side -->
        <div class="home-btn">
          <a class="btn btn-outline-light" href="/">
            <i class="fa-solid fa-house"></i> Home
          </a>
        </div>

        <style>
          .home-btn {
            margin-left: 30px;
          }
        </style>

        <!-- Center Title -->
        <div class="position-absolute start-50 translate-middle-x text-center">
          <h4 class="mb-0 fw-bold text-white">Smart Resume Screening</h4>
          <small class="text-light"> AI Recruitment Platform </small>
        </div>

        <!-- Right Side -->
        <div class="d-flex align-items-center ms-auto">
          <div class="dropdown">
            <button
              class="btn btn-primary dropdown-toggle d-flex align-items-center"
              type="button"
              id="userProfileDropdown"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <img
                src="https://ui-avatars.com/api/?name={{ user.username }}&background=ffffff&color=0d6efd"
                width="30"
                height="30"
                class="rounded-circle me-2"
              />

              {{ user.username }}
            </button>

            <ul
              class="dropdown-menu dropdown-menu-end"
              aria-labelledby="userProfileDropdown"
            >
              <li>
                <a class="dropdown-item" href="#">
                  <i class="fa-solid fa-user me-2"></i>My Profile
                </a>
              </li>
              <li>
                <a class="dropdown-item" href="#">
                  <i class="fa-solid fa-gear me-2"></i>Settings
                </a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item text-danger" href="/accounts/logout/">
                  <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <!-- Sidebar -->

    <div class="sidebar">
      <a href="/dashboard/">
        <i class="fas fa-home"></i>

        Dashboard
      </a>

      <a href="/jobs/add/">
        <i class="fas fa-plus-circle"></i>

        Add Job
      </a>

      <a href="/jobs/">
        <i class="fas fa-list"></i>

        Job List
      </a>

      <a href="/resume/upload/">
        <i class="fas fa-upload"></i>

        Upload Resume
      </a>

      <a href="/resume/">
        <i class="fas fa-file"></i>

        Resume List
      </a>

      <a href="#">
        <i class="fas fa-users"></i>

        Candidates
      </a>

      <a href="#">
        <i class="fas fa-robot"></i>

        AI Screening
      </a>

      <a href="#">
        <i class="fas fa-chart-line"></i>

        Reports
      </a>
    </div>

    <!-- Dashboard -->

    <div class="main-content">{% block content %} {% endblock %}</div>
  </body>
</html>
