{% extends 'base.html' %} {% block content %}
<div class="container mt-5 py-3">
  <div class="welcome-header mb-5 text-white">
    <h2 class="fw-bold mb-1">
      <i class="fa-solid fa-chart-pie text-primary me-2"></i>Dashboard
    </h2>
    <p class="text-secondary mb-0 fs-5">
      Welcome back,
      <span class="text-primary fw-bold">{{ user.username }}</span>! Here is
      your recruitment overview.
    </p>
  </div>

  <div class="row g-4">
    <div class="col-md-3 col-sm-6 animate-card" style="--delay: 1">
      <div class="card stat-card h-100 shadow-lg border-0 text-white">
        <div
          class="card-body p-4 d-flex align-items-center justify-content-between"
        >
          <div>
            <h3 class="fw-bold mb-1 display-6 text-primary">{{ jobs }}</h3>
            <p
              class="text-secondary fw-semibold mb-0 small text-uppercase tracking-wider"
            >
              Total Jobs
            </p>
          </div>
          <div class="icon-shape bg-primary-subtle text-primary">
            <i class="fa-solid fa-briefcase"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3 col-sm-6 animate-card" style="--delay: 2">
      <div class="card stat-card h-100 shadow-lg border-0 text-white">
        <div
          class="card-body p-4 d-flex align-items-center justify-content-between"
        >
          <div>
            <h3 class="fw-bold mb-1 display-6 text-info">{{ resumes }}</h3>
            <p
              class="text-secondary fw-semibold mb-0 small text-uppercase tracking-wider"
            >
              Total Resumes
            </p>
          </div>
          <div class="icon-shape bg-info-subtle text-info">
            <i class="fa-solid fa-file-lines"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3 col-sm-6 animate-card" style="--delay: 3">
      <div class="card stat-card h-100 shadow-lg border-0 text-white">
        <div
          class="card-body p-4 d-flex align-items-center justify-content-between"
        >
          <div>
            <h3 class="fw-bold mb-1 display-6 text-success">
              {{ shortlisted }}
            </h3>
            <p
              class="text-secondary fw-semibold mb-0 small text-uppercase tracking-wider"
            >
              Shortlisted
            </p>
          </div>
          <div class="icon-shape bg-success-subtle text-success">
            <i class="fa-solid fa-user-check"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3 col-sm-6 animate-card" style="--delay: 4">
      <div class="card stat-card h-100 shadow-lg border-0 text-white">
        <div
          class="card-body p-4 d-flex align-items-center justify-content-between"
        >
          <div>
            <h3 class="fw-bold mb-1 display-6 text-warning">{{ pending }}</h3>
            <p
              class="text-secondary fw-semibold mb-0 small text-uppercase tracking-wider"
            >
              Pending
            </p>
          </div>
          <div class="icon-shape bg-warning-subtle text-warning">
            <i class="fa-solid fa-clock-history"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  body {
    background-color: #0b0f19 !important; /* डीप डार्क नाइट ब्लू */
  }

  /* 1. ऑटो एनिमेशन: नीचे से ऊपर तैरते हुए आना (Fade In & Slide Up) */
  @keyframes cardEntrance {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-card {
    opacity: 0;
    /* --delay वेरिएबल के आधार पर हर कार्ड थोड़ा रुक कर खुलेगा (Staggered effect) */
    animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: calc(var(--delay) * 0.1s);
  }

  /* हेडर के लिए एनिमेशन */
  .welcome-header {
    opacity: 0;
    animation: cardEntrance 0.5s ease forwards;
  }

  /* 2. कार्ड्स की प्रीमियम डार्क स्टाइल */
  .stat-card {
    background-color: #111827 !important; /* गहरा चारकोल ग्रे */
    border: 1px solid rgba(255, 255, 255, 0.05) !important;
    border-radius: 16px !important;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
  }

  /* 3. होवर और क्लिक/एक्टिव एनिमेशन */
  .stat-card:hover {
    transform: translateY(-6px);
    border-color: rgba(255, 255, 255, 0.15) !important;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5) !important;
  }

  /* क्लिक करते समय हल्का सा दबने वाला इफ़ेक्ट (Active State) */
  .stat-card:active {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4) !important;
  }

  /* 4. आइकॉन्स के डिब्बे की स्टाइल */
  .icon-shape {
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: 22px;
  }

  /* बूटस्ट्रैप के कलर्स को डार्क बैकग्राउंड के हिसाब से एडजस्ट करना */
  .bg-primary-subtle {
    background: rgba(13, 110, 253, 0.15);
  }
  .bg-info-subtle {
    background: rgba(13, 202, 240, 0.15);
  }
  .bg-success-subtle {
    background: rgba(25, 135, 84, 0.15);
  }
  .bg-warning-subtle {
    background: rgba(255, 193, 7, 0.15);
  }
</style>
{% endblock %}
