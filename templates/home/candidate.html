{% load static %}
<!doctype html>
<html>
  <head>
    <title>Recruiter Panel</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/recruiter.css' %}" />
    <link rel="stylesheet" href="{% static 'css/job_list.css' %}">
    {% comment %}
    <link rel="stylesheet" href="{% static 'css/applications.css' %}" />
    {% endcomment %}

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="topbar">
      <div class="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </div>

      <div class="top-right">
        <i class="fa-solid fa-bell"></i>

        <div class="profile">
          <div class="profile-circle">J</div>
        </div>
      </div>
    </div>
    {% block content %} {% endblock %}

    <script src="{% static 'js/recruiter.js' %}"></script>
  </body>
</html>
