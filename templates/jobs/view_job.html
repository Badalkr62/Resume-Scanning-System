{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ job.title }}</h3>
    </div>

    <div class="card-body">
      <table class="table">
        <tr>
          <th>Company</th>
          <td>{{ job.company }}</td>
        </tr>

        <tr>
          <th>Location</th>
          <td>{{ job.location }}</td>
        </tr>

        <tr>
          <th>Salary</th>
          <td>{{ job.salary }}</td>
        </tr>

        <tr>
          <th>Job Type</th>
          <td>{{ job.job_type }}</td>
        </tr>

        <tr>
          <th>Deadline</th>
          <td>{{ job.deadline }}</td>
        </tr>

        <tr>
          <th>Skills</th>
          <td>{{ job.skills }}</td>
        </tr>

        <tr>
          <th>Description</th>
          <td>{{ job.description }}</td>
        </tr>
      </table>

      <a href="{% url 'job_list' %}" class="btn btn-secondary"> Back </a>
    </div>
  </div>
</div>

{% endblock %}
